resources:
  jobs:
    city_order_pipeline:
      name: city-order-pipeline
      
      tasks:
        - task_key: ingest
          spark_python_task:
            python_file: ../src/ingestion/ingest_orders.py
          environment_key: default
        
        - task_key: transform
          depends_on:
            - task_key: ingest
          spark_python_task:
            python_file: ../src/transformation/transform_orders.py
          environment_key: default

        - task_key: validate
          depends_on: 
            - task_key: transform
          spark_python_task:
            python_file: ../src/validation/validate_orders.py
          environment_key: default
        
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
      