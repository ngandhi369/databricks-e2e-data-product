resources:
  jobs:
   demo-pipeline:
    name: demo-asset-bundle-pipieline
    
    tasks:
      - task_key: ingest
        spark_python_task:
          python_file: ../src/ingest.py
        environment_key: default
        max_retries: 0
      
      - task_key: transform
        depends_on:
          - task_key: ingest
        spark_python_task:
          python_file: ../src/transform.py
        environment_key: default
        max_retries: 0

      - task_key: validate
        depends_on: 
          - task_key: transform
        spark_python_task:
          python_file: ../src/validate.py
        environment_key: default
        max_retries: 0

      - task_key: check_status
        depends_on:
          - task_key: validate
        condition_task:
          op: EQUAL_TO
          left: "{{tasks.validate.values.status}}"
          right: "success"
        
      - task_key: success_check
        depends_on:
          - task_key: check_status
            outcome: "true"
        spark_python_task:
          python_file: ../src/ingest.py
        environment_key: default
        max_retries: 0
      
    environments:
      - environment_key: default
        spec:
          environment_version: "4"
      
          
     