name: Deploy Databricks Bundle

on:
  push:
   branches:
    - master

jobs:
  deploy:
   runs-on: ubuntu-latest

   steps:
    
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install Databricks CLI
      run: |
        curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | bash
    
    - name: Configure Databricks Authentication
      run: 
        databricks auth login --host $DATABRICKS_HOST --token $DATABRICKS_TOKEN
      env:
        DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    - name: Validate Bundle
      run: databricks bundel Validate
    
    - name: Deploy Bundle
      run: databricks bundle deploy --target dev
      
