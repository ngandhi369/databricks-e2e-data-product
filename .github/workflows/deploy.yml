name: Deploy Databricks Bundle

on:
  push:
    branches:
      - master
  release:
    types: [published]
  
jobs:
  lint_and_validate:
    name: Lint and Validate Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: |
          pip install pyspark ruff pytest pytest-cov
      
      - name: Lint with ruff
        run: ruff check src/ api/
      
      - name: Run test 
        run: pytest tests/ -v --tb=short

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate --target dev

  deploy_bundle_to_dev_databricks:
    name: Deploy to Dev
    needs: lint_and_validate
    if: github.event_name == 'push' 
    runs-on: ubuntu-latest
    environment: databricks-dev

    concurrency:
      group: databricks-bundle-deploy-dev
      cancel-in-progress: true

    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy bundle
        run: databricks bundle deploy --target dev

  Run_pipeline_on_dev_databricks:
    name: Run Pipeline on Dev
    needs: deploy_bundle_to_dev_databricks
    runs-on: ubuntu-latest
    environment: databricks-dev

    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}  
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
      
      - name: Run data pipeline
        run: databricks bundle run city_order_pipeline --target dev

  deploy_bundle_to_prod_databricks:
    name: Deploy to Prod
    needs: lint_and_validate
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment: databricks-prod

    concurrency:
      group: databricks-bundle-deploy-prod
      cancel-in-progress: false

    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate --target prod

      - name: Deploy bundle
        run: databricks bundle deploy --target prod
