# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: nirdosh_dab
  uuid: 1de87a6f-b896-418d-b3a9-b44c0227cea0
  git: 
    origin_url: https://github.com/ngandhi369/databricks-e2e-data-product
    branch: master

include:
  - resources/*.yml
  - resources/*/*.yml

sync:
  include:
    - src/**
    - data/**
  exclude:
    - tests/** 

# artifacts:
#   python_artifact:
#     type: whl
#     build: uv build --wheel

# Variable declarations. 
# These variables are assigned values in the dev/prod targets below based on environments
variables:
  catalog:
    description: The UC catalog to use
  schema:
    description: The UC schema to use
  volume_path:
    description: The file path to use
  notification_email:
    description: Email to receive job notifications
    default: nirdoshgandhi02@gmail.com

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-14ad825f-2de6.cloud.databricks.com
      root_path: ~/.bundle/${bundle.name}/${bundle.target}
    variables:
      volume_path: "dbfs:/Volumes/nirdosh_catalog_dev/nirdosh_schema_dev/nirdosh_volume_dev/"
      catalog: nirdosh_catalog_dev
      schema: nirdosh_schema_dev
      notification_email: gandhinirdosh@gmail.com

    # I used user-isolated deployment paths for development and shared workspace paths for production to ensure safe multi-user collaboration.”

  prod:
    mode: production 
    workspace:
      host: https://dbc-14ad825f-2de6.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/nirdoshgandhi02@gmail.com to make sure we only have a single copy.
      root_path: /Shared/city-orders/${bundle.name}/${bundle.target}
    variables:
      volume_path: "dbfs:/Volumes/nirdosh_catalog_prod/nirdosh_schema_prod/nirdosh_volume_prod/"
      catalog: nirdosh_catalog_prod
      schema: nirdosh_schema_prod
      notification_email: gandhinirdosh@gmail.com
    run_as: 
      service_principal_name: sp-nirdoshgandhi
    permissions:
      - user_name: gandhinirdosh@gmail.com
        level: CAN_VIEW
      - service_principal_name: sp-nirdoshgandhi
        level: CAN_MANAGE
